<html lang="pt-br">
<head>

<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin:0; padding:20px; display: flex; justify-content: center; }
#loginDiv { display:flex; justify-content:center; align-items:center; height:100vh; }
.container { max-width: 100%; width: 95%; background: #fff; padding: 20px; border-radius: 8px; box-sizing: border-box; overflow-x:auto; margin-top:20px; }
h2 { text-align: center; margin-bottom: 20px; }
.field-group { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.field-group label { width: 80px; margin-top:0; text-align: left; }
input, select, button { padding: 6px; box-sizing: border-box; font-size: 14px; }
button { background-color: #1976d2; color: white; border: none; cursor: pointer; }
button:hover { background-color: #145ea8; }
.operacoes-list { border: 1px solid #ccc; padding: 5px; max-height: 180px; overflow-y: auto; width:100%; }
.operacoes-list div { padding: 3px; cursor: pointer; text-align:left; }
.operacoes-list div.selected { background-color: #c8daf7; }

#formChartWrapper { display: flex; align-items: flex-start; gap: 30px; flex-wrap: wrap; margin-bottom: 30px; }
#formLeft { flex:1; min-width:300px; display:flex; flex-direction: column; gap:5px; }
#imagesWrapper { display: flex; gap: 10px; margin-top: 5px; align-items: flex-start; }
.image-box { text-align: center; display:flex; flex-direction: column; align-items:center; }
.image-box label { font-weight:bold; margin-bottom:5px; background:#1976d2; color:#fff; padding:2px 5px; border-radius: 3px; }
.image-box img { width: 150px; height: 120px; border:1px solid #000; object-fit: contain; }

#chartContainer { width:500px; height:400px; flex-shrink:0; display:flex; flex-direction:column; min-height: 350px; }
#tempoOperacoesWrapper, #eficienciaMediaWrapper { margin-top:10px; }
#tempoOperacoesWrapper label, #eficienciaMediaWrapper label { font-weight:bold; margin-bottom:5px; display:block; }
#tempoOperacoes, #eficienciaMedia { width:100%; padding:6px; box-sizing:border-box; }

#dashboard { margin-top: 30px; width: 100%; overflow-x:auto; }
table { width: 100%; border-collapse: collapse; table-layout: auto; word-wrap: break-word; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
table td:nth-child(7), table th:nth-child(7) { max-width: 200px; word-wrap: break-word; white-space: normal; }
.pagination { margin-top: 10px; text-align: right; white-space: nowrap; }
.pagination button { display: inline-block; margin: 0 2px; padding: 4px 8px; border: 1px solid #ccc; background-color: #fff; color: #333; cursor: pointer; border-radius: 4px; font-size: 14px; }
.pagination button:hover { background-color: #f0f0f0; }
.pagination button.active { background-color: #1976d2; color: #fff; border-color: #1976d2; }
.pagination span { display: inline-block; margin: 0 4px; }
</style>
</head>

<div class="container" id="loginDiv">
  <div style="width:300px;text-align:center;">
    <h2>Login</h2>
    <label>Usuário:</label>
    <input type="text" id="username" style="width:100%;">
    <label>Senha:</label>
    <input type="password" id="password" style="width:100%;">
    <button onclick="login()" style="width:100%; margin-top:10px;">Entrar</button>
    <p id="loginMsg" style="color:red;"></p>
  </div>
</div>

<div class="container" id="appDiv" style="display:none;">
<h2>Apontamento de Produção</h2>

<div id="formChartWrapper">
  <div id="formLeft">
    <div class="field-group"><label>Linha:</label><select id="linha"><option value="Linha 1">Linha 1</option><option value="Linha 2">Linha 2</option><option value="Linha 3">Linha 3</option></select></div>
    <div class="field-group"><label>Carro:</label><select id="carro" onchange="atualizarModelos(); atualizarImagens();"></select></div>
    <div class="field-group"><label>Modelo:</label><select id="modelo" onchange="atualizarOperacoes(); atualizarImagens();"></select></div>

    <div id="imagesWrapper">

      </div>
      <div class="image-box">
        <label>Capa</label>
        <img id="imgCapa" src="" alt="Capa">

    </div>

    <label>Operações:</label>

    <button onclick="registrarPeca()" style="margin-top:10px; align-self:flex-start;">Registrar Peça</button>

    <div id="tempoOperacoesWrapper">

    </div>
    <div id="eficienciaMediaWrapper">
      <label>Eficiência Média (últimos 60)</label>
      <input type="text" id="eficienciaMedia" readonly value="0">
    </div>
  </div>
</div>

<div style="margin-bottom:10px;">

</div>

// Login
function login(){
  const username=document.getElementById('username').value;
  const password=document.getElementById('password').value;
  const user=users.find(u=>u.username===username && u.password===password);
  if(user){
    currentUser=user.username;
    document.getElementById('loginDiv').style.display='none';
    document.getElementById('appDiv').style.display='block';
    preencherCarros();
  } else {
    document.getElementById('loginMsg').innerText="Usuário ou senha incorretos.";
  }
}

// Preencher select de carros
function preencherCarros(){
  const carroSelect=document.getElementById('carro');
  carroSelect.innerHTML='';
  Object.keys(modelosPorCarro).forEach(c=>{
    let opt=document.createElement('option'); opt.value=c; opt.text=c; carroSelect.add(opt);
  });
  atualizarModelos();
  atualizarImagens();
  atualizarOperacoes();
}

// Atualizar modelos
function atualizarModelos(){
  const carro=document.getElementById('carro').value;
  const modeloSelect=document.getElementById('modelo');
  modeloSelect.innerHTML='';
  modelosPorCarro[carro].forEach(m=>{
    let opt=document.createElement('option'); opt.value=m; opt.text=m; modeloSelect.add(opt);
  });
  atualizarOperacoes();
}

// Atualizar imagens
function atualizarImagens(){
  const carro=document.getElementById('carro').value;
  const modelo=document.getElementById('modelo').value;
  const capa=document.getElementById('capa').value;
  document.getElementById('imgCarro').src=carro+".png";
  document.getElementById('imgCapa').src=carro+"-"+modelo+"-"+capa+".png";
}

// Atualizar operações
function atualizarOperacoes(){
  operacoesSelecionadas=[];
  const carro=document.getElementById('carro').value;
  const modelo=document.getElementById('modelo').value;
  const capa=document.getElementById('capa').value;
  const div=document.getElementById('operacoes');
  div.innerHTML='';
  const ops=operacoesTabela.filter(o=>o.carro===carro && o.modelo===modelo && o.capa===capa);
  ops.forEach(op=>{
    const d=document.createElement('div');
    d.innerText=`${op.codigo} - ${op.processo} (${op.tempo}s)`;
    d.dataset.tempo=op.tempo;
    d.dataset.codigo=op.codigo;
    d.onclick=()=>{d.classList.toggle('selected'); atualizarMeta();};
    div.appendChild(d);
  });
  atualizarMeta();
}

// Atualizar tempo
function atualizarMeta(){
  operacoesSelecionadas=[];
  document.querySelectorAll('#operacoes div.selected').forEach(d=>operacoesSelecionadas.push({codigo:d.dataset.codigo,tempo:parseInt(d.dataset.tempo)}));
  const total=operacoesSelecionadas.reduce((sum,o)=>sum+o.tempo,0);
  document.getElementById('tempoOperacoes').value=total;
}

// Registrar peça
function registrarPeca(){
  if(operacoesSelecionadas.length===0){alert("Selecione ao menos uma operação"); return;}
  const linha=document.getElementById('linha').value;
  const carro=document.getElementById('carro').value;
  const modelo=document.getElementById('modelo').value;
  const capa=document.getElementById('capa').value;
  const ops=operacoesSelecionadas.map(o=>o.codigo).join(', ');
  const meta=parseInt(document.getElementById('tempoOperacoes').value);
  const hora=new Date();
  let tempoReal=lastTime?Math.round((hora-lastTime)/1000):0;
  lastTime=hora;
  const eficiencia=(tempoReal>0)?((meta/tempoReal)*100).toFixed(1):0;
  const registro={hora:hora.toLocaleTimeString(),usuario:currentUser,linha,carro,modelo,capa,operacoes:ops,meta,tempoReal,eficiencia};
  let registros=JSON.parse(localStorage.getItem('registros'))||[];
  registros.unshift(registro);
  localStorage.setItem('registros',JSON.stringify(registros));
  carregarTabela(currentPage);
  atualizarGrafico();
  atualizarEficienciaMedia();
}

// Limpar registros
function limparRegistros(){
  if(confirm("Deseja realmente limpar todos os registros?")){
    localStorage.removeItem('registros');
    carregarTabela(1);
    atualizarGrafico();
    atualizarEficienciaMedia();
    lastTime=null;
  }
}

// Eficiência média
function atualizarEficienciaMedia(){
  const registros=JSON.parse(localStorage.getItem('registros'))||[];
  const ultimos=registros.filter(r=>r.tempoReal>0).slice(0,60);
  if(ultimos.length===0){document.getElementById('eficienciaMedia').value=0; return;}
  const soma=ultimos.reduce((sum,r)=>sum+parseFloat(r.eficiencia),0);
  const media=(soma/ultimos.length).toFixed(1);
  document.getElementById('eficienciaMedia').value=media;
}

// Carregar tabela
function carregarTabela(page=1){
  currentPage=page;
  const tabela=document.getElementById('tabela');
  tabela.innerHTML=`<tr><th>Hora</th><th>Usuário</th><th>Linha</th><th>Carro</th><th>Modelo</th><th>Capa</th><th>Operações</th><th>Meta (s)</th><th>Tempo Real (s)</th><th>Eficiência (%)</th></tr>`;
  const registros=JSON.parse(localStorage.getItem('registros'))||[];
  const totalPaginas=Math.ceil(registros.length/10);
  const start=(page-1)*10;
  const end=Math.min(start+10,registros.length);
  registros.slice(start,end).forEach(r=>{
    const row=tabela.insertRow();
    row.insertCell(0).innerText=r.hora;
    row.insertCell(1).innerText=r.usuario;
    row.insertCell(2).innerText=r.linha;
    row.insertCell(3).innerText=r.carro;
    row.insertCell(4).innerText=r.modelo;
    row.insertCell(5).innerText=r.capa;
    row.insertCell(6).innerText=r.operacoes;
    row.insertCell(7).innerText=r.meta;
    row.insertCell(8).innerText=r.tempoReal;
    row.insertCell(9).innerText=r.eficiencia;
  });
}

// Gráfico
let chart=null;
function atualizarGrafico(){
  const registros=JSON.parse(localStorage.getItem('registros'))||[];
  const ultimos=registros.slice(0,30).reverse();
  const labels=ultimos.map((r,i)=>i+1);
  const data=ultimos.map(r=>parseFloat(r.eficiencia));
  if(chart) chart.destroy();
  const ctx=document.getElementById('eficienciaChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{label:'Eficiência %',data,borderColor:'#1976d2',backgroundColor:'rgba(25,118,210,0.2)',tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:150}}}
  });
}
